<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Missing from the Studio Archive</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/dark-mode.css">
    <link rel="stylesheet" href="../assets/css/rtl.css">
    <link rel="icon" type="image/png" href="../assets/img/logo.png">
    <script src="https://unpkg.com/lucide@0.344.0"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: var(--bg-light);
            transition: var(--transition-smooth);
        }
        body.dark-mode {
            background: var(--primary-color);
        }
        .error-content {
            text-align: center;
            max-width: 600px;
            padding: 0 var(--space-24);
        }
        .error-num {
            font-size: 12rem;
            font-family: var(--font-primary);
            font-weight: 700;
            line-height: 1;
            margin-bottom: var(--space-16);
            color: var(--primary-color);
            opacity: 0.05;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            pointer-events: none;
        }
        body.dark-mode .error-num {
            color: white;
            opacity: 0.03;
        }
        .error-stack {
            position: relative;
            z-index: 2;
        }
        h1 { font-family: var(--font-primary); margin-bottom: var(--space-24); }
        p { opacity: 0.7; margin-bottom: var(--space-48); font-size: 1.1rem; }
        
        .nav-link { color: var(--primary-color); text-decoration: none; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; }
        body.dark-mode .nav-link { color: white; }
        body.dark-mode h1 { color: white; }
        
        /* Focus Action - Dark Mode Override */
        body.dark-mode .btn-primary {
            background-color: var(--secondary-color);
            color: var(--primary-color);
            border-color: var(--secondary-color);
        }
    </style>
</head>
<body>

    <!-- Symmetrical Controls -->
    <a href="../index.html" class="nav-link" style="position: absolute; top: var(--space-48); left: var(--space-48); z-index: 10; display: flex; align-items: center; gap: 8px; text-decoration: none;">
        <i data-lucide="arrow-left" style="width: 20px; height: 20px;"></i>
        Return to the Studio
    </a>

    <button class="control-btn theme-toggle" aria-label="Toggle Theme" style="position: absolute; top: var(--space-48); right: var(--space-48); z-index: 11; background: transparent; border: none; cursor: pointer; color: inherit;">
        <i data-lucide="moon" style="width: 24px; height: 24px;"></i>
    </button>

    <div class="error-num">404</div>

    <div class="error-content">
        <div class="error-stack">
            <a href="../index.html" class="logo" style="margin-bottom: var(--space-48); display: inline-flex; align-items: center; gap: 8px; color: inherit; text-decoration: none;">
                <img src="../assets/img/logo.png" alt="Oxen Logo" class="logo-icon">
                Oxen
            </a>

            <span class="journal-tag" style="color: var(--secondary-color); margin-bottom: var(--space-24);">Archival Irregularity</span>
            <h1>The Untethered Stitch</h1>
            <p>It seems the digital artifact you are seeking has unraveled from our archive. Either the line has been retired or the path has been misdirected.</p>
            
            <div style="display: flex; gap: var(--space-24); justify-content: center;">
                <a href="../index.html" class="btn btn-primary">Studio Home</a>
                <a href="products.html" class="btn btn-secondary">Current Vault</a>
            </div>
        </div>
    </div>

    <script src="../assets/js/main.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
