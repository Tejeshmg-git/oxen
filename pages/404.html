<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Missing from the Studio Archive</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/dark-mode.css">
    <link rel="stylesheet" href="../assets/css/rtl.css">
    <link rel="icon" type="image/png" href="../assets/img/logo.png">
    <script src="https://unpkg.com/lucide@0.344.0"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: var(--bg-light);
            transition: var(--transition-smooth);
        }
        body.dark-mode {
            background: var(--primary-color);
        }
        .error-content {
            text-align: center;
            max-width: 600px;
            padding: 0 var(--space-24);
        }
        .error-num {
            font-size: var(--text-h1);
            font-family: var(--font-primary);
            font-weight: 700;
            line-height: 1;
            margin-bottom: var(--space-16);
            color: var(--text-primary);
            opacity: 0.05;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            pointer-events: none;
        }
        body.dark-mode .error-num {
            color: white;
            opacity: 0.03;
        }
        .error-stack {
            position: relative;
            z-index: 2;
        }
        h1 { font-family: var(--font-primary); margin-bottom: var(--space-24); }
        p { opacity: 0.7; margin-bottom: var(--space-48); }
        
        .nav-link { color: var(--text-primary); text-decoration: none; text-transform: uppercase; letter-spacing: 2px; }
        body.dark-mode .nav-link { color: white; }
        body.dark-mode h1 { color: white; }
        
        body.dark-mode .btn-primary {
            background-color: var(--secondary-color);
            color: var(--text-on-gold);
            border-color: var(--secondary-color);
        }

        @media (max-width: 640px) {
            .status-link { top: var(--space-24) !important; left: var(--space-24) !important; }
            .theme-toggle { top: var(--space-24) !important; right: var(--space-24) !important; }
            .status-back-text { display: none; }
            .error-actions { flex-direction: column; gap: var(--space-16) !important; width: 100%; max-width: 280px; margin: 0 auto; }
            .error-actions .btn { width: 100%; text-align: center; }
        }
    </style>
</head>
<body>

    <a href="../index.html" class="status-link" style="position: absolute; top: var(--space-32); left: var(--space-32); text-transform: uppercase; letter-spacing: 2px; z-index: 10; display: flex; align-items: center; gap: 8px; text-decoration: none; color: inherit;">
        <i data-lucide="arrow-left" style="width: 18px; height: 18px;"></i>
        <span class="status-back-text">Back to Home</span>
    </a>

    <button class="control-btn theme-toggle" aria-label="Toggle Theme" style="position: absolute; top: var(--space-32); right: var(--space-32); z-index: 11; background: transparent; border: none; cursor: pointer; color: inherit;">
        <i data-lucide="moon" style="width: 20px; height: 20px;"></i>
    </button>

    <div class="error-num">404</div>

    <div class="error-content">
        <div class="error-stack">
            <a href="../index.html" class="logo" style="margin-bottom: var(--space-48); display: inline-flex; align-items: center; gap: 8px; color: inherit; text-decoration: none;">
                <img src="../assets/img/logo.png" alt="Oxen Logo" class="logo-icon">
                Oxen
            </a>

            <span class="journal-tag" style="color: var(--secondary-color); margin-bottom: var(--space-24);">Archival Irregularity</span>
            <h1 style="line-height: 1.1;">The Untethered <br>Stitch</h1>
            <p style="margin-bottom: var(--space-48); opacity: 0.7; max-width: 450px; margin-left: auto; margin-right: auto;">It seems the digital artifact you are seeking has unraveled from our archive.</p>
            
            <div class="error-actions" style="display: flex; gap: var(--space-24); justify-content: center;">
                <a href="../index.html" class="btn btn-primary">Studio Home</a>
                <a href="login.html" class="btn btn-secondary">Login</a>
                <a href="products.html" class="btn btn-secondary">Current Vault</a>
            </div>
        </div>
    </div>

    <script src="../assets/js/main.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
