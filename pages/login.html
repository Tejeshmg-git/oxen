<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Oxen Leather</title>
    <link rel="icon" type="image/png" href="../assets/img/logo.png">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/dark-mode.css">
    <link rel="stylesheet" href="../assets/css/rtl.css">
    <script src="https://unpkg.com/lucide@0.344.0"></script>
</head>
<body class="flex-center">

    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg-light);
            transition: var(--transition-smooth);
            margin: 0;
            padding: 0;
            position: relative;
        }
        .status-link {
            position: absolute;
            top: var(--space-32);
            left: var(--space-32);
            font-size: var(--text-xs);
            text-transform: uppercase;
            letter-spacing: 2px;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: inherit;
            font-weight: 600;
            opacity: 0.7;
            transition: var(--transition-smooth);
        }
        .status-link:hover {
            opacity: 1;
            color: var(--secondary-color);
        }
        .auth-controls {
            position: absolute;
            top: var(--space-32);
            right: var(--space-32);
            display: flex;
            gap: var(--space-12);
            z-index: 1000;
        }
        .auth-container {
            background: var(--bg-light);
            border: 1px solid rgba(0,0,0,0.1);
            padding: var(--space-48);
            border-radius: var(--border-radius);
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            box-sizing: border-box;
            transition: var(--transition-smooth);
            position: relative;
        }
        .input-group {
            margin-bottom: var(--space-16);
        }
        .input-label {
            display: block;
            margin-bottom: var(--space-8);
            font-weight: 600;
        }
        .input-field {
            width: 100%;
            padding: 0 var(--space-16);
            min-height: var(--touch-target);
            border: 1px solid rgba(0,0,0,0.15);
            border-radius: var(--border-radius);
            background: transparent;
            color: inherit;
            box-sizing: border-box;
            font-family: inherit;
        }
        .input-field:focus {
            border-color: var(--secondary-color);
            outline: none;
        }
        .social-login {
            display: flex;
            gap: var(--space-16);
        }
        @media (max-width: 640px) {
            .status-back-text {
                display: none;
            }
            .status-link, .auth-controls {
                top: var(--space-24);
            }
            .status-link { left: var(--space-24); }
            .auth-controls { right: var(--space-24); }
        }
        @media (max-width: 480px) {
            .auth-container {
                padding: var(--space-32) var(--space-24);
                margin: var(--space-16);
                border: none;
                box-shadow: none;
            }
            .social-login {
                flex-direction: column;
                gap: var(--space-12);
            }
        }

        /* Auth Link Styling */
        .auth-container a:not(.logo):not(.btn) {
            color: var(--secondary-color);
            text-decoration: underline;
            text-underline-offset: 4px;
            opacity: 1;
            transition: var(--transition-smooth);
            font-weight: 600;
        }
        .auth-container a:not(.logo):not(.btn):hover {
            opacity: 0.8;
            color: var(--secondary-color);
        }

        /* Dark Mode Overrides */
        body.dark-mode .auth-container {
            border-color: rgba(255, 255, 255, 0.15);
        }
        body.dark-mode .input-field {
            border-color: rgba(255, 255, 255, 0.15);
        }
        body.dark-mode .auth-container p,
        body.dark-mode .auth-container .input-label,
        body.dark-mode .auth-container h1 {
            color: white;
        }
    </style>

    <a href="../index.html" class="status-link">
        <i data-lucide="arrow-left" style="width: 18px; height: 18px;"></i>
        <span class="status-back-text">Back to Home</span>
    </a>

    <div class="auth-controls">
        <button class="control-btn theme-toggle" id="theme-toggle" aria-label="Toggle Theme">
            <i data-lucide="moon"></i>
        </button>
    </div>

    <div class="auth-container">
        <div class="text-center" style="margin-bottom: var(--space-32);">
            <a href="../index.html" class="logo" style="justify-content: center; margin-bottom: var(--space-16);">
                <img src="../assets/img/logo.png" alt="Oxen Logo" class="logo-icon">
                Oxen
            </a>
            <h1 style="font-size: 1.75rem; text-transform: none; letter-spacing: normal; font-weight: 700; margin-top: var(--space-16);">Welcome Back</h1>
            <p style="opacity: 0.6; font-size: var(--text-ui);">Enter your credentials to access your account</p>
        </div>

        <form>
            <div class="input-group">
                <label class="input-label">Email Address</label>
                <input type="email" placeholder="name@email.com" class="input-field" required>
            </div>
            <div class="input-group">
                <label class="input-label">Password</label>
                <div style="position: relative;">
                    <input type="password" placeholder="••••••••" class="input-field" required>
                    <button type="button" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #888;">
                        <i data-lucide="eye" style="width: 18px; height: 18px;"></i>
                    </button>
                </div>
            </div>
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-32);">
                <label style="display: flex; align-items: center; gap: var(--space-8); cursor: pointer;">
                    <input type="checkbox"> Remember Me
                </label>
                <a href="#">Forgot Password?</a>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
            
            <div style="margin-top: var(--space-48); text-align: center;">
                <p style="font-size: 0.9rem; opacity: 0.6; margin-bottom: var(--space-16);">Or continue with</p>
                <div class="social-login">
                    <button type="button" class="btn btn-secondary btn-sm" style="flex: 1; display: flex; align-items: center; justify-content: center; gap: 10px;">
                        <svg viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"/>
                        </svg>
                        <span>Google</span>
                    </button>
                    <button type="button" class="btn btn-secondary btn-sm" style="flex: 1; display: flex; align-items: center; justify-content: center; gap: 10px;">
                        <svg viewBox="0 0 384 512" width="18" height="18" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                            <path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-1.7-111.9zM263 115c12.7-16.1 19.4-38.3 17-60.4-21 .8-42.3 12.7-55.8 28.8-12.7 15.1-23.7 37.7-20.9 59.3 24.1 1.9 45.4-10.4 59.7-27.7z"/>
                        </svg>
                        <span>Apple</span>
                    </button>
                </div>
            </div>
        </form>

        <div style="margin-top: var(--space-48); text-align: center;">
            <p>Don't have an account? <a href="signup.html" style="font-weight: 700;">Join now</a></p>
        </div>
    </div>

    <script src="../assets/js/main.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
