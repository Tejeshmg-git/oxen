<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Oxen Leather</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/dark-mode.css">
    <link rel="stylesheet" href="../assets/css/rtl.css">
    <script src="https://unpkg.com/lucide@0.344.0"></script>
</head>
<body class="flex-center">

    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg-light);
            transition: var(--transition-smooth);
            margin: 0;
            padding: 0;
            position: relative;
        }
        .status-link {
            position: absolute;
            top: var(--space-32);
            left: var(--space-32);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: inherit;
            font-weight: 600;
            opacity: 0.7;
            transition: var(--transition-smooth);
        }
        .status-link:hover {
            opacity: 1;
            color: var(--secondary-color);
        }
        .auth-controls {
            position: absolute;
            top: var(--space-32);
            right: var(--space-32);
            display: flex;
            gap: var(--space-12);
            z-index: 1000;
        }
        .auth-container {
            background: var(--bg-light);
            border: 1px solid rgba(0,0,0,0.1);
            padding: var(--space-48);
            border-radius: var(--border-radius);
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            box-sizing: border-box;
            transition: var(--transition-smooth);
            position: relative;
        }
        .input-group {
            margin-bottom: var(--space-16);
        }
        .input-label {
            display: block;
            margin-bottom: var(--space-8);
            font-weight: 600;
        }
        .input-field {
            width: 100%;
            padding: 0 var(--space-16);
            min-height: var(--touch-target);
            border: 1px solid rgba(0,0,0,0.15);
            border-radius: var(--border-radius);
            background: transparent;
            color: inherit;
            box-sizing: border-box;
            font-family: inherit;
        }
        .input-field:focus {
            border-color: var(--secondary-color);
            outline: none;
        }
        .social-login {
            display: flex;
            gap: var(--space-16);
        }
        @media (max-width: 640px) {
            .status-back-text {
                display: none;
            }
            .status-link, .auth-controls {
                top: var(--space-24);
            }
            .status-link { left: var(--space-24); }
            .auth-controls { right: var(--space-24); }
        }
        @media (max-width: 480px) {
            .auth-container {
                padding: var(--space-32) var(--space-24);
                margin: var(--space-16);
                border: none;
                box-shadow: none;
            }
            .social-login {
                flex-direction: column;
                gap: var(--space-12);
            }
        }

        /* Dark Mode Overrides */
        body.dark-mode .auth-container a:not(.logo) {
            color: var(--secondary-color) !important;
        }
        body.dark-mode .auth-container p,
        body.dark-mode .auth-container .input-label,
        body.dark-mode .auth-container h1 {
            color: white;
        }
    </style>

    <a href="../index.html" class="status-link">
        <i data-lucide="arrow-left" style="width: 18px; height: 18px;"></i>
        <span class="status-back-text">Back to Home</span>
    </a>

    <div class="auth-controls">
        <button class="control-btn theme-toggle" id="theme-toggle" aria-label="Toggle Theme">
            <i data-lucide="moon"></i>
        </button>
    </div>

    <div class="auth-container">
        <div class="text-center" style="margin-bottom: var(--space-32);">
            <a href="../index.html" class="logo" style="justify-content: center;">
                <img src="../assets/img/logo.png" alt="Oxen Logo" class="logo-icon">
                Oxen
            </a>
            <h1 style="margin-top: var(--space-16); font-size: 2rem;">Welcome Back</h1>
            <p>Enter your credentials to access your account</p>
        </div>

        <form>
            <div class="input-group">
                <label class="input-label">Email Address</label>
                <input type="email" placeholder="name@email.com" class="input-field" required>
            </div>
            <div class="input-group">
                <label class="input-label">Password</label>
                <div style="position: relative;">
                    <input type="password" placeholder="••••••••" class="input-field" required>
                    <button type="button" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #888;">
                        <i data-lucide="eye" style="width: 18px; height: 18px;"></i>
                    </button>
                </div>
            </div>
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-32); font-size: 0.9rem;">
                <label style="display: flex; align-items: center; gap: var(--space-8); cursor: pointer;">
                    <input type="checkbox"> Remember Me
                </label>
                <a href="#">Forgot Password?</a>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
            
            <div style="margin-top: var(--space-48); text-align: center;">
                <p style="font-size: 0.9rem; opacity: 0.6; margin-bottom: var(--space-16);">Or continue with</p>
                <div class="social-login">
                    <button type="button" class="btn btn-secondary btn-sm" style="flex: 1; display: flex; align-items: center; justify-content: center; gap: 10px;">
                        <svg viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"/>
                        </svg>
                        <span>Google</span>
                    </button>
                    <button type="button" class="btn btn-secondary btn-sm" style="flex: 1; display: flex; align-items: center; justify-content: center; gap: 10px;">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                            <path d="M17.05 20.28c-.98.95-2.05 1.61-3.21 1.61-1.14 0-1.5-.69-2.84-.69-1.35 0-1.75.67-2.84.67-1.12 0-2.23-.74-3.25-1.74C2.86 18.1 1.5 14.45 1.5 11.23c0-3.32 2.05-5.06 4-5.06 1.1 0 1.95.63 2.65.63.7 0 1.6-.68 2.8-.68 1.15 0 2.2.55 2.85 1.34-2.48 1.45-2.07 5.14.7 6.28-.68 1.72-1.6 3.44-2.45 4.54zM12.03 5.48c-.03-2.05 1.68-3.9 3.45-3.98.24 2.16-1.77 4-3.45 3.98z"/>
                        </svg>
                        <span>Apple</span>
                    </button>
                </div>
            </div>
        </form>

        <div style="margin-top: var(--space-48); text-align: center; font-size: 0.9rem;">
            <p>Don't have an account? <a href="signup.html" style="font-weight: 700;">Join now</a></p>
        </div>
    </div>

    <script src="../assets/js/main.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
