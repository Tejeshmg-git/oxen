<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Oxen Leather</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/dark-mode.css">
    <link rel="stylesheet" href="../assets/css/rtl.css">
    <script src="https://unpkg.com/lucide@0.344.0"></script>
</head>
<body class="auth-container">
    <style>
        @media (max-width: 640px) {
            .status-link { top: var(--space-24) !important; left: var(--space-24) !important; }
            .theme-toggle { top: var(--space-24) !important; right: var(--space-24) !important; }
            .status-back-text { display: none; }
        }
    </style>

    <a href="../index.html" class="status-link" style="position: absolute; top: var(--space-32); left: var(--space-32); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; z-index: 10; display: flex; align-items: center; gap: 8px; text-decoration: none; color: inherit;">
        <i data-lucide="arrow-left" style="width: 18px; height: 18px;"></i>
        <span class="status-back-text">Studio</span>
    </a>

    <button class="control-btn theme-toggle" id="theme-toggle" aria-label="Toggle Theme" style="position: absolute; top: var(--space-32); right: var(--space-32); z-index: 11; background: transparent; border: none; cursor: pointer; color: inherit;">
        <i data-lucide="moon" style="width: 20px; height: 20px;"></i>
    </button>

    <div class="auth-card">
        <div class="text-center" style="margin-bottom: var(--space-32);">
            <div class="flex-center" style="margin-bottom: var(--space-24);">
                <a href="../index.html" class="logo">
                    <img src="../assets/img/logo.png" alt="Oxen Logo" class="logo-icon">
                    Oxen
                </a>
            </div>
            <h1 style="margin-top: var(--space-16); font-size: 1.5rem;">Create Account</h1>
            <p style="opacity: 0.7;">Join the artisan leather community</p>
        </div>

        <form>
            <div style="margin-bottom: var(--space-16);">
                <label style="display: block; margin-bottom: var(--space-8); font-weight: 600;">Full Name</label>
                <input type="text" placeholder="John Doe" style="width: 100%; padding: 0 var(--space-16); min-height: var(--touch-target); border: 1px solid #ccc; border-radius: var(--border-radius); background: transparent; color: inherit; box-sizing: border-box;">
            </div>
            <div style="margin-bottom: var(--space-16);">
                <label style="display: block; margin-bottom: var(--space-8); font-weight: 600;">Email Address</label>
                <input type="email" placeholder="name@email.com" style="width: 100%; padding: 0 var(--space-16); min-height: var(--touch-target); border: 1px solid #ccc; border-radius: var(--border-radius); background: transparent; color: inherit; box-sizing: border-box;">
            </div>
            <div style="margin-bottom: var(--space-16);">
                <label style="display: block; margin-bottom: var(--space-8); font-weight: 600;">Password</label>
                <div style="position: relative;">
                    <input type="password" placeholder="••••••••" style="width: 100%; padding: 0 var(--space-16); min-height: var(--touch-target); border: 1px solid #ccc; border-radius: var(--border-radius); background: transparent; color: inherit; box-sizing: border-box;">
                    <button type="button" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #888;">
                        <i data-lucide="eye" style="width: 18px; height: 18px;"></i>
                    </button>
                </div>
            </div>
            
            <div style="margin-bottom: var(--space-32); font-size: 0.9rem;">
                <label style="display: flex; align-items: flex-start; gap: var(--space-8); cursor: pointer;">
                    <input type="checkbox" style="margin-top: 4px;"> 
                    <span>I agree to the <a href="#" style="color: var(--primary-color); font-weight: 600;">Terms of Service</a> and <a href="#" style="color: var(--primary-color); font-weight: 600;">Privacy Policy</a></span>
                </label>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
            
            <div style="margin-top: var(--space-32); text-align: center;">
                <p>Or sign up with</p>
                <div class="flex-center" style="gap: var(--space-16); margin-top: var(--space-16);">
                    <button type="button" class="btn btn-secondary btn-sm" style="flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; text-transform: uppercase; font-weight: 600;">
                        <svg viewBox="0 0 24 24" style="width: 18px; height: 18px;" xmlns="http://www.w3.org/2000/svg">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                        </svg>
                        GOOGLE
                    </button>
                    <button type="button" class="btn btn-secondary btn-sm" style="flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; text-transform: uppercase; font-weight: 600;">
                        <i data-lucide="apple" style="width: 18px; height: 18px;"></i>
                        APPLE
                    </button>
                </div>
            </div>
        </form>

        <div style="margin-top: var(--space-48); text-align: center; font-size: 0.9rem;">
            <p>Already have an account? <a href="login.html" style="color: var(--primary-color); text-decoration: none; font-weight: 700;">Log in</a></p>
        </div>
    </div>

    <script src="../assets/js/main.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
